{% extends 'base.html' %}

{% block title %}Iniciar Sesión — AuditReady Labs{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card bg-dark border-secondary text-white p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold"><i class="fas fa-flask text-info me-2"></i>LabCor</h3>
            <p class="text-muted">Acceso al Sistema de Gestión</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label text-muted">Usuario</label>
                <input type="text" name="username" class="form-control bg-black text-white border-secondary" required autofocus>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-muted">Contraseña</label>
                <input type="password" name="password" class="form-control bg-black text-white border-secondary" required>
            </div>

            <button type="submit" class="btn btn-info w-100 fw-bold">Entrar</button>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
