{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Registrar Cliente</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success mt-3">Guardar Cliente</button>
        <a href="{% url 'b_m02_clientes:dashboard' %}" class="btn btn-secondary mt-3">Cancelar</a>
    </form>
</div>
{% endblock %}
