{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Registrar Acuerdo de Confidencialidad</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success mt-3">Guardar Acuerdo</button>
        <a href="{% url 'b_m02_clientes:dashboard' %}" class="btn btn-secondary mt-3">Cancelar</a>
    </form>
</div>
{% endblock %}
