{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-secondary">
                <div class="card-header bg-secondary text-white"><h4 class="mb-0 fw-bold"><i class="fas fa-certificate me-2"></i> {{ titulo }}</h4></div>
                <div class="card-body bg-light">
                    <form method="post" enctype="multipart/form-data" class="bg-white p-4 border rounded shadow-sm">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mt-4 text-end border-top pt-3">
                            <a href="{% url 'd_m09_dashboard' %}" class="btn btn-light shadow-sm me-2">Cancelar</a>
                            <button type="submit" class="btn btn-secondary shadow-sm"><i class="fas fa-save"></i> Guardar MRC</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
