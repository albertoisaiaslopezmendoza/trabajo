{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LABCOR | LIMBS — Sistema de Gestión de Calidad ISO/IEC 17025{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Definimos los colores principales del sitio en variables CSS para fácil acceso */
        :root {
            --bg-main: #f4f6f9;
            --bg-topbar: #2c3e50;
            --card-bg: #ffffff;
            --card-border: #dee2e6;
            --card-hover: #ebf5fb;
            --text-main: #2c3e50;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        /* ----- BARRA SUPERIOR (TOPBAR) ----- */
        .topbar {
            background-color: var(--bg-topbar);
            height: 52px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #ecf0f1;
        }
        .topbar-brand {
            font-size: 16px;
            font-weight: bold;
            color: #f39c12;
            margin-right: 15px;
            text-decoration: none;
        }
        .topbar-subtitle {
            font-size: 11px;
            color: #bdc3c7;
            margin-right: 30px;
        }
        .search-container {
            display: flex;
            align-items: center;
            background-color: #34495e;
            border-radius: 4px;
            padding: 2px 10px;
        }
        .search-input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            margin-left: 8px;
            width: 250px;
            font-size: 13px;
        }
        .search-input::placeholder { color: #bdc3c7; }

        /* ----- CONTENIDO PRINCIPAL ----- */
        .main-content {
            margin-left: 0;
            margin-top: 52px;
            padding: 24px;
            min-height: calc(100vh - 52px);
        }

        /* Estilos base para las tarjetas de módulos */
        .module-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.2s;
            cursor: pointer;
        }
        .module-card:hover {
            background-color: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="{% url 'inicio' %}" class="topbar-brand">🏭 LABCOR</a>
        <span class="topbar-subtitle">SGC ISO/IEC 17025</span>

        <div class="search-container d-none d-md-flex">
            <i class="fas fa-search" style="color: #bdc3c7; font-size: 12px;"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar módulo o código (ej. A01)...">
        </div>

        <div class="ms-auto d-flex align-items-center">
            <span style="font-size: 12px; color: #2ecc71; margin-right: 15px;">
                ● BD Conectada (PostgreSQL)
            </span>
            <span style="font-size: 14px; margin-right: 15px; cursor: pointer;">
                ⟳
            </span>

            <div class="dropdown">
                <a href="#" class="text-decoration-none text-white dropdown-toggle" data-bs-toggle="dropdown">
                    👤 {{ user.username|default:"Admin" }}
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li><a class="dropdown-item" href="#">Perfil</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </div>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
