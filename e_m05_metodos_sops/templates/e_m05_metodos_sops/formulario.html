{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm mx-auto" style="max-width: 800px;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ accion }} Método o SOP</h4>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    {% for field in form %}
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                </div>
                <div class="d-flex justify-content-end mt-3">
                    <a href="{% url 'e_m05_dashboard' %}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Guardar Documento</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
